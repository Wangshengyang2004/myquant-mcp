<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyQuant Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #262626;
            --bg-hover: #2a2a2a;
            --border-color: #333333;
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --accent: #cc785c;
            --accent-hover: #dd8a6e;
            --success: #4ade80;
            --error: #ef4444;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            line-height: 1.6;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, opacity 0.2s ease;
            position: relative;
            z-index: 20;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        /* Sidebar Header */
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #d97757);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
        }

        .sidebar-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .sidebar-close {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .sidebar-close:hover {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        /* New Chat Button */
        .new-chat-section {
            padding: 12px 16px;
        }

        .new-chat-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
            border-color: #404040;
        }

        .new-chat-btn svg {
            flex-shrink: 0;
        }

        /* Conversations List */
        .conversations-section {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 16px;
        }

        .conversations-section::-webkit-scrollbar {
            width: 6px;
        }

        .conversations-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .conversations-section::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .conversations-section::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 4px 8px;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.15s ease;
            position: relative;
        }

        .conversation-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .conversation-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .conversation-item-icon {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            color: var(--text-muted);
        }

        .conversation-item-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-item-delete {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .conversation-item:hover .conversation-item-delete {
            opacity: 1;
        }

        .conversation-item-delete:hover {
            background: var(--bg-hover);
            color: var(--error);
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.15s ease;
        }

        .footer-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-primary);
        }

        /* Header */
        .header {
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .header-toggle {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .header-toggle:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .header-spacer {
            flex: 1;
        }

        .header-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .status-indicator.disconnected {
            background: var(--error);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }

        .chat-content {
            width: 100%;
            max-width: 768px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), #d97757);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
            color: white;
            margin-bottom: 24px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .welcome-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 600px;
        }

        .suggestion-chip {
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .suggestion-chip:hover {
            background: var(--bg-tertiary);
            border-color: #404040;
            color: var(--text-primary);
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.2s ease;
            margin-bottom: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 24px;
            height: 24px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 12px;
            font-weight: 600;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--accent), #d97757);
        }

        .message.user .message-avatar {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .assistant-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .assistant-content .tool-use {
            margin-bottom: 4px;
        }

        .assistant-content .message-bubble {
            margin-top: 4px;
        }

        /* Response Group */
        .response-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            animation: fadeIn 0.2s ease;
        }

        .response-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: flex-start;
        }

        .response-text {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .response-text .message {
            margin-bottom: 0;
        }

        /* Tool Summary */
        .tool-summary {
            display: none;  /* Hidden by default, shown when collapsed */
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(74, 222, 128, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.1);
            border-radius: var(--radius-sm);
            margin-left: auto;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tool-summary:hover {
            background: rgba(74, 222, 128, 0.08);
            border-color: rgba(74, 222, 128, 0.2);
        }

        .tool-summary-text {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* When collapsed, hide individual tools and only show summary */
        .response-tools.collapsed .tool-use {
            display: none !important;
        }

        .response-tools.collapsed .tool-summary {
            display: inline-flex !important;
        }

        .tool-use.collapsed .tool-use-details {
            display: none;
        }

        .tool-use.collapsed .tool-use-toggle {
            transform: rotate(0deg);
        }

        .message-bubble {
            padding: 8px 12px;
            border-radius: var(--radius-md);
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.assistant .message-bubble {
            background: transparent;
            padding-left: 0;
            padding-top: 0;
        }

        .message.user .message-bubble {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }

        .message-bubble p {
            margin: 0 0 8px 0;
        }

        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        /* Message Actions */
        .message-actions {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .message:hover .message-actions,
        .response-group:hover .message-actions {
            opacity: 1;
        }

        .message-action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s ease;
        }

        .message-action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .message-action-btn svg {
            width: 14px;
            height: 14px;
        }

        .message-bubble pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
            line-height: 1.4;
        }

        .message-bubble code {
            background: var(--bg-secondary);
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .message-bubble pre code {
            background: transparent;
            padding: 0;
        }

        /* Tool Use - smaller inline style */
        .tool-use {
            margin: 4px 0;
            font-size: 12px;
        }

        .tool-use-header {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(74, 222, 128, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.15);
            border-radius: var(--radius-sm);
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
        }

        .tool-use-header:hover {
            background: rgba(74, 222, 128, 0.12);
            border-color: rgba(74, 222, 128, 0.25);
        }

        .tool-use-icon {
            width: 12px;
            height: 12px;
            color: var(--success);
            flex-shrink: 0;
        }

        .tool-use-name {
            font-weight: 500;
            color: var(--text-secondary);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
        }

        .tool-use-toggle {
            width: 12px;
            height: 12px;
            color: var(--text-muted);
            transition: transform 0.2s ease;
            opacity: 0.6;
        }

        .tool-use-toggle.expanded {
            transform: rotate(90deg);
        }

        .tool-use-details {
            margin-top: 6px;
            padding: 8px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            display: none;
        }

        .tool-use-details.expanded {
            display: block;
        }

        .tool-use-details pre {
            margin: 0;
            padding: 6px 8px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            font-size: 11px;
            line-height: 1.3;
            overflow-x: auto;
        }

        /* Markdown styles in messages */
        .message-bubble h1, .message-bubble h2, .message-bubble h3,
        .message-bubble h4, .message-bubble h5, .message-bubble h6 {
            margin-top: 16px;
            margin-bottom: 8px;
            font-weight: 600;
            line-height: 1.3;
        }

        .message-bubble h1 { font-size: 24px; }
        .message-bubble h2 { font-size: 20px; }
        .message-bubble h3 { font-size: 18px; }
        .message-bubble h4 { font-size: 16px; }
        .message-bubble h5 { font-size: 14px; }
        .message-bubble h6 { font-size: 13px; }

        .message-bubble ul, .message-bubble ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-bubble li {
            margin: 4px 0;
        }

        .message-bubble strong {
            font-weight: 600;
            color: var(--text-primary);
        }

        .message-bubble em {
            font-style: italic;
        }

        .message-bubble a {
            color: var(--accent);
            text-decoration: none;
        }

        .message-bubble a:hover {
            text-decoration: underline;
        }

        .message-bubble blockquote {
            margin: 12px 0;
            padding: 8px 12px;
            border-left: 3px solid var(--accent);
            background: rgba(204, 120, 92, 0.1);
            color: var(--text-secondary);
        }

        .message-bubble table {
            margin: 12px 0;
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }

        .message-bubble th, .message-bubble td {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .message-bubble th {
            background: var(--bg-secondary);
            font-weight: 600;
        }

        /* Input Area */
        .input-area {
            padding: 16px 20px 24px;
            background: var(--bg-primary);
        }

        .input-wrapper {
            max-width: 768px;
            margin: 0 auto;
            position: relative;
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            transition: all 0.15s ease;
        }

        .input-box:focus-within {
            border-color: #404040;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.3);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.5;
            min-height: 24px;
            max-height: 200px;
            padding: 0;
        }

        .input-box textarea:focus {
            outline: none;
        }

        .input-box textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--accent);
            color: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .interrupt-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--error);
            color: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .interrupt-btn.visible {
            display: flex;
        }

        .interrupt-btn:hover {
            background: #dc2626;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                box-shadow: 20px 0 40px rgba(0, 0, 0, 0.5);
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
            }

            .chat-container {
                padding: 16px 16px;
            }

            .input-area {
                padding: 12px 16px 16px;
            }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            text-align: center;
        }

        .empty-state-icon {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 14px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <!-- Sidebar Header -->
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="logo-icon">M</div>
                <span class="sidebar-title">MyQuant</span>
            </div>
            <button class="sidebar-close" onclick="toggleSidebar()" aria-label="Close sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- New Chat -->
        <div class="new-chat-section">
            <button class="new-chat-btn" onclick="startNewChat()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                <span>New chat</span>
            </button>
        </div>

        <!-- Conversations List -->
        <div class="conversations-section">
            <div class="section-label">Recent</div>
            <div id="conversationsList"></div>
        </div>

        <!-- Sidebar Footer -->
        <div class="sidebar-footer">
            <a href="https://myquant.simonwsy.online" target="_blank" class="footer-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
                <span>MyQuant Dashboard</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <button class="header-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
            <div class="header-spacer"></div>
            <div class="header-title">
                <span class="status-indicator" id="statusDot"></span>
                <span>GLM-4.7</span>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="chat-content" id="chatContent">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">M</div>
                    <h1 class="welcome-title">MyQuant Agent</h1>
                    <p class="welcome-subtitle">AI-powered quantitative trading assistant</p>
                    <div class="suggestions">
                        <span class="suggestion-chip" onclick="sendSuggestion('Get latest data for SHSE.600000')">Get SHSE.600000 data</span>
                        <span class="suggestion-chip" onclick="sendSuggestion('What are my current positions?')">Current positions</span>
                        <span class="suggestion-chip" onclick="sendSuggestion('Analyze SHSE.600000 fundamentals')">Analyze fundamentals</span>
                        <span class="suggestion-chip" onclick="sendSuggestion('Get money flow for SHSE.600000')">Money flow analysis</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea id="input" placeholder="Message MyQuant Agent..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                    <button class="interrupt-btn" id="interruptBtn" aria-label="Stop generating">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // State
        let currentConversationId = null;
        let conversations = [];
        let isConnected = false;
        let isStreaming = false;
        let lastUserMessage = null;  // Track last user message for regeneration

        // Elements
        const sidebar = document.getElementById('sidebar');
        const conversationsList = document.getElementById('conversationsList');
        const chatContent = document.getElementById('chatContent');
        const chatContainer = document.getElementById('chatContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const interruptBtn = document.getElementById('interruptBtn');
        const statusDot = document.getElementById('statusDot');

        // Toggle Sidebar
        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        // Auto-resize textarea
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            sendBtn.disabled = !this.value.trim();
        });

        // Load conversations
        async function loadConversations() {
            try {
                const response = await fetch('/agent/api/conversations');
                const data = await response.json();
                conversations = data.conversations || [];
                renderConversations();
            } catch (e) {
                console.error('Failed to load conversations:', e);
            }
        }

        // Render conversations
        function renderConversations() {
            if (conversations.length === 0) {
                conversationsList.innerHTML = `
                    <div class="empty-state">
                        <p class="empty-state-text">No recent conversations</p>
                    </div>
                `;
                return;
            }

            conversationsList.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${conv.id === currentConversationId ? 'active' : ''}" onclick="loadConversation('${conv.id}')">
                    <svg class="conversation-item-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span class="conversation-item-text">${escapeHtml(conv.title)}</span>
                    <button class="conversation-item-delete" onclick="event.stopPropagation(); deleteConversation('${conv.id}')" aria-label="Delete">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        // Start new chat
        function startNewChat() {
            currentConversationId = null;
            currentResponseGroup = null;  // Reset response group
            lastUserMessage = null;  // Reset last user message
            chatContent.innerHTML = `
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">M</div>
                    <h1 class="welcome-title">MyQuant Agent</h1>
                    <p class="welcome-subtitle">AI-powered quantitative trading assistant</p>
                    <div class="suggestions">
                        <span class="suggestion-chip" onclick="sendSuggestion('Get latest data for SHSE.600000')">Get SHSE.600000 data</span>
                        <span class="suggestion-chip" onclick="sendSuggestion('What are my current positions?')">Current positions</span>
                        <span class="suggestion-chip" onclick="sendSuggestion('Analyze SHSE.600000 fundamentals')">Analyze fundamentals</span>
                        <span class="suggestion-chip" onclick="sendSuggestion('Get money flow for SHSE.600000')">Money flow analysis</span>
                    </div>
                </div>
            `;
            renderConversations();
            input.focus();
        }

        // Load conversation
        async function loadConversation(convId) {
            try {
                const response = await fetch(`/agent/api/conversations/${convId}`);
                const data = await response.json();
                const conv = data.conversation;

                currentConversationId = convId;
                chatContent.innerHTML = '';

                // IMPORTANT: Reset global state so new messages don't append to old groups
                currentResponseGroup = null;
                lastUserMessage = null;  // Reset last user message

                // Group messages by turn (user + assistant response with tools + text)
                let localResponseGroup = null;

                for (const msg of conv.messages || []) {
                    if (msg.role === 'user') {
                        localResponseGroup = null;
                        addMessage('user', msg.content);
                    } else if (msg.role === 'tool') {
                        if (!localResponseGroup) {
                            localResponseGroup = createResponseGroup();
                        }
                        // Add tool to current response group
                        const toolId = 'tool-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                        localResponseGroup.toolCount++;

                        const toolDiv = document.createElement('div');
                        toolDiv.className = 'tool-use collapsed';  // Start collapsed when loading history
                        toolDiv.id = `tool-${toolId}`;
                        toolDiv.innerHTML = `
                            <div class="tool-use-header" onclick="toggleToolDetails('${toolId}')">
                                <svg class="tool-use-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                                </svg>
                                <span class="tool-use-name">${escapeHtml(msg.name)}</span>
                                <svg class="tool-use-toggle" id="toggle-${toolId}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 18 15 12 9 6"/>
                                </svg>
                            </div>
                            <div class="tool-use-details" id="details-${toolId}">
                                <pre>${escapeHtml(msg.input)}</pre>
                            </div>
                        `;
                        localResponseGroup.tools.appendChild(toolDiv);
                    } else if (msg.role === 'assistant') {
                        if (!localResponseGroup) {
                            localResponseGroup = createResponseGroup();
                        }
                        // Add text to current response group
                        const div = document.createElement('div');
                        div.className = 'message assistant';
                        div.innerHTML = `
                            <div class="message-avatar"></div>
                            <div class="message-content">
                                <div class="message-bubble">${formatContent(msg.content)}</div>
                            </div>
                        `;
                        localResponseGroup.text.appendChild(div);
                        // Add summary and close group
                        if (localResponseGroup.toolCount > 0) {
                            const summary = document.createElement('div');
                            summary.className = 'tool-summary';
                            summary.innerHTML = `
                                <svg class="tool-use-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                                </svg>
                                <span class="tool-summary-text">Used ${localResponseGroup.toolCount} tool${localResponseGroup.toolCount > 1 ? 's' : ''}</span>
                            `;
                            // Click to expand/collapse all tools
                            summary.addEventListener('click', () => {
                                localResponseGroup.tools.classList.toggle('collapsed');
                            });
                            localResponseGroup.tools.appendChild(summary);
                        }
                        localResponseGroup = null;
                    }
                }

                renderConversations();
                // Close sidebar on mobile after selection
                if (window.innerWidth <= 768) {
                    sidebar.classList.add('collapsed');
                }
            } catch (e) {
                console.error('Failed to load conversation:', e);
            }
        }

        // Delete conversation
        async function deleteConversation(convId) {
            try {
                await fetch(`/agent/api/conversations/${convId}`, { method: 'DELETE' });
                if (currentConversationId === convId) {
                    startNewChat();
                } else {
                    loadConversations();
                }
            } catch (e) {
                console.error('Failed to delete conversation:', e);
            }
        }

        // Add message to chat
        function addMessage(role, content) {
            const isUser = role === 'user';
            const avatar = isUser ? 'U' : '';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${formatContent(content)}</div>
                </div>
            `;
            chatContent.appendChild(div);
            scrollToBottom();
            return div.querySelector('.message-bubble');
        }

        // Assistant response group (tools + text)
        let currentResponseGroup = null;
        let currentToolCount = 0;
        let hasTextInCurrentTurn = false;  // Track if current turn has text

        function createResponseGroup() {
            const div = document.createElement('div');
            div.className = 'response-group';
            div.innerHTML = `
                <div class="response-tools"></div>
                <div class="response-text"></div>
            `;
            chatContent.appendChild(div);
            currentResponseGroup = {
                container: div,
                tools: div.querySelector('.response-tools'),
                text: div.querySelector('.response-text'),
                toolCount: 0
            };
            hasTextInCurrentTurn = false;
            return currentResponseGroup;
        }

        function addToolUse(toolName, toolInput) {
            if (!currentResponseGroup) {
                createResponseGroup();
            }

            const toolId = 'tool-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            currentResponseGroup.toolCount++;

            let inputJson = toolInput;
            try {
                const parsed = JSON.parse(toolInput);
                inputJson = JSON.stringify(parsed, null, 2);
            } catch {}

            const toolDiv = document.createElement('div');
            toolDiv.className = 'tool-use';
            toolDiv.id = `tool-${toolId}`;
            toolDiv.innerHTML = `
                <div class="tool-use-header" onclick="toggleToolDetails('${toolId}')">
                    <svg class="tool-use-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    <span class="tool-use-name">${escapeHtml(toolName)}</span>
                    <svg class="tool-use-toggle" id="toggle-${toolId}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </div>
                <div class="tool-use-details" id="details-${toolId}">
                    <pre>${escapeHtml(inputJson)}</pre>
                </div>
            `;
            currentResponseGroup.tools.appendChild(toolDiv);
            scrollToBottom();
            return toolId;
        }

        function addAssistantText(content) {
            if (!currentResponseGroup) {
                createResponseGroup();
            }
            hasTextInCurrentTurn = true;
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="message-avatar"></div>
                <div class="message-content">
                    <div class="message-bubble">${formatContent(content)}</div>
                    <div class="message-actions">
                        <button class="message-action-btn" onclick="regenerateLastResponse()" title="Regenerate">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 4v6h-6M1 20v-6h6"/>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                            Regenerate
                        </button>
                    </div>
                </div>
            `;
            currentResponseGroup.text.appendChild(div);
            scrollToBottom();
            return div.querySelector('.message-bubble');
        }

        function closeResponseGroup() {
            if (!currentResponseGroup || currentResponseGroup.toolCount === 0) {
                currentResponseGroup = null;
                return;
            }

            // Store reference before clearing currentResponseGroup
            const toolsContainer = currentResponseGroup.tools;
            const toolCount = currentResponseGroup.toolCount;

            console.log(`closeResponseGroup: toolCount=${toolCount}, hasText=${hasTextInCurrentTurn}`);

            const summary = document.createElement('div');
            summary.className = 'tool-summary';
            summary.innerHTML = `
                <svg class="tool-use-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                </svg>
                <span class="tool-summary-text">Used ${toolCount} tool${toolCount > 1 ? 's' : ''}</span>
            `;
            // Click to expand/collapse all tools
            summary.addEventListener('click', () => {
                toolsContainer.classList.toggle('collapsed');
                console.log('Summary clicked, toggling collapsed class');
            });
            toolsContainer.appendChild(summary);

            // Auto-collapse tools container
            console.log('Auto-collapsing tools container');
            toolsContainer.classList.add('collapsed');

            currentResponseGroup = null;
            hasTextInCurrentTurn = false;
        }

        // Add thinking indicator after tools
        function addThinkingIndicator() {
            if (!currentResponseGroup) {
                createResponseGroup();
            }
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'thinkingIndicator';
            div.innerHTML = `
                <div class="message-avatar"></div>
                <div class="message-content">
                    <div class="message-bubble" style="display: flex; align-items: center; gap: 8px; color: var(--text-muted);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        <span>Thinking...</span>
                    </div>
                </div>
            `;
            currentResponseGroup.text.appendChild(div);
            scrollToBottom();
        }

        // Add CSS for spinner animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        `;
        document.head.appendChild(style);

        // Toggle tool details
        function toggleToolDetails(toolId) {
            const details = document.getElementById('details-' + toolId);
            const toggle = document.getElementById('toggle-' + toolId);
            if (details.classList.contains('expanded')) {
                details.classList.remove('expanded');
                toggle.classList.remove('expanded');
            } else {
                details.classList.add('expanded');
                toggle.classList.add('expanded');
            }
        }

        // Format message content using marked.js
        function formatContent(text) {
            if (!text) return '';
            if (typeof marked === 'undefined') {
                // Fallback if marked.js not loaded
                text = escapeHtml(text);
                text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
                text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
                text = text.replace(/\n/g, '<br>');
                text = text.replace(/<br><br>/g, '</p><p>');
                return '<p>' + text + '</p>';
            }
            // Use marked.js for markdown rendering
            return marked.parse(text);
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Scroll to bottom
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Interrupt conversation
        async function interruptConversation() {
            if (!currentConversationId || !isStreaming) return;

            try {
                const response = await fetch('/agent/api/interrupt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ conversation_id: currentConversationId })
                });

                if (response.ok) {
                    addMessage('assistant', '_Generation stopped by user._');
                } else {
                    const data = await response.json();
                    addMessage('assistant', `_Error: ${data.error || 'Failed to interrupt'}_`);
                }
            } catch (err) {
                addMessage('assistant', `_Error: ${err.message}_`);
            }
        }

        // Regenerate last response
        async function regenerateLastResponse() {
            if (!lastUserMessage || isStreaming) return;

            // Remove the last assistant response(s) to regenerate
            // Find and remove the last response-group
            const responseGroups = document.querySelectorAll('.response-group');
            if (responseGroups.length > 0) {
                const lastGroup = responseGroups[responseGroups.length - 1];
                lastGroup.remove();
            }

            // Resend the last user message
            await sendMessage(lastUserMessage);
        }

        // Send message
        async function sendMessage(userMessage) {
            if (!userMessage.trim()) return;

            // Track last user message for regeneration
            lastUserMessage = userMessage;

            // Remove welcome screen
            const welcome = document.getElementById('welcomeScreen');
            if (welcome) welcome.remove();

            addMessage('user', userMessage);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            // Show interrupt button, hide send button
            isStreaming = true;
            interruptBtn.classList.add('visible');
            sendBtn.style.display = 'none';

            // Reset response group
            currentResponseGroup = null;

            // Add typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar"></div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContent.appendChild(typingDiv);
            scrollToBottom();

            try {
                const response = await fetch('/agent/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: userMessage,
                        conversation_id: currentConversationId
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let streamingBubble = null;
                let accumulatedText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.trim() || !line.startsWith('data: ')) continue;

                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.type === 'session_id') {
                                currentConversationId = data.id;
                                loadConversations();
                            } else if (data.type === 'text') {
                                // Remove typing and thinking indicators
                                const typing = document.getElementById('typingIndicator');
                                if (typing) typing.remove();
                                const thinking = document.getElementById('thinkingIndicator');
                                if (thinking) thinking.remove();

                                accumulatedText += data.content;
                                if (!streamingBubble) {
                                    streamingBubble = addAssistantText('');
                                }
                                streamingBubble.innerHTML = formatContent(accumulatedText);
                                scrollToBottom();
                            } else if (data.type === 'turn_end') {
                                // Turn ended - collapse tools
                                console.log('Turn end event, closing response group');
                                closeResponseGroup();
                            } else if (data.type === 'tool') {
                                // Remove typing indicator
                                const typing = document.getElementById('typingIndicator');
                                if (typing) typing.remove();
                                addToolUse(data.name, data.input);
                            } else if (data.type === 'thinking') {
                                // Remove typing indicator
                                const typing = document.getElementById('typingIndicator');
                                if (typing) typing.remove();
                                // Show thinking indicator
                                addThinkingIndicator();
                            } else if (data.type === 'done') {
                                // Remove typing and thinking indicators
                                const typing = document.getElementById('typingIndicator');
                                if (typing) typing.remove();
                                const thinking = document.getElementById('thinkingIndicator');
                                if (thinking) thinking.remove();
                                console.log('Done event received, closing response group');
                                closeResponseGroup();
                                isConnected = true;
                                statusDot.classList.remove('disconnected');
                            } else if (data.type === 'error') {
                                const typing = document.getElementById('typingIndicator');
                                if (typing) typing.remove();
                                const thinking = document.getElementById('thinkingIndicator');
                                if (thinking) thinking.remove();
                                addMessage('assistant', `Error: ${data.message}`);
                            }
                        } catch (e) {
                            // Ignore parse errors for incomplete JSON
                        }
                    }
                }

                // Remove typing and thinking indicators if still present
                const typing = document.getElementById('typingIndicator');
                if (typing) typing.remove();
                const thinking = document.getElementById('thinkingIndicator');
                if (thinking) thinking.remove();

            } catch (err) {
                const typing = document.getElementById('typingIndicator');
                if (typing) typing.remove();
                const thinking = document.getElementById('thinkingIndicator');
                if (thinking) thinking.remove();
                addMessage('assistant', `Connection error: ${err.message}`);
                isConnected = false;
                statusDot.classList.add('disconnected');
            } finally {
                sendBtn.disabled = false;
                sendBtn.style.display = '';
                interruptBtn.classList.remove('visible');
                isStreaming = false;
                input.focus();
            }
        }

        // Send suggestion
        function sendSuggestion(text) {
            input.value = text;
            sendMessage(text);
        }

        // Event listeners
        sendBtn.addEventListener('click', () => sendMessage(input.value));
        interruptBtn.addEventListener('click', () => interruptConversation());

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(input.value);
            }
        });

        // Initial load
        loadConversations();
        input.focus();

        // Handle window resize
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.remove('collapsed');
            }
        });
    </script>
</body>
